name: Sync consumers

# Single source of truth = this repo. On every push to main, propagate the new
# commit to both consumers automatically:
#   - spektrum-client: bump the `spektrum-shared` git submodule pointer + push.
#     That commit triggers a Vercel redeploy of the frontend.
#   - spektrum-server (home server): fire a deploy webhook so it pulls the new
#     shared clone, reinstalls, and restarts the backend.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   CONSUMER_SYNC_TOKEN  GitHub PAT (or fine-grained token) with `contents:write`
#                        on SpektrumTCG/spektrum-client. Used to push the bump.
#   HOME_DEPLOY_HOOK     (optional) URL the home server listens on to redeploy
#                        the backend. Omit to skip backend notification.

on:
  push:
    branches: [main]

concurrency:
  group: sync-consumers
  cancel-in-progress: false

jobs:
  bump-client-submodule:
    runs-on: ubuntu-latest
    steps:
      # NOTE: submodules:false on purpose. We are about to REPLACE the submodule
      # pointer, so we must not try to fetch/checkout the current (possibly
      # stale or orphaned) pinned commit — that would fail with "not our ref".
      - name: Checkout spektrum-client (no submodules)
        uses: actions/checkout@v4
        with:
          repository: SpektrumTCG/spektrum-client
          token: ${{ secrets.CONSUMER_SYNC_TOKEN }}
          submodules: false
          fetch-depth: 0

      - name: Repoint spektrum-shared submodule to the just-pushed commit
        run: |
          set -euo pipefail
          NEW_SHA="${GITHUB_SHA}"
          CUR_SHA="$(git ls-tree HEAD spektrum-shared | awk '{print $3}')"
          echo "client pin: ${CUR_SHA:-<none>} -> ${NEW_SHA}"
          if [ "${CUR_SHA}" = "${NEW_SHA}" ]; then
            echo "Already pinned; nothing to do."
            exit 0
          fi
          # Set the gitlink (mode 160000) directly to NEW_SHA without fetching
          # the old commit. NEW_SHA is the commit that triggered this run, so it
          # exists on spektrum-shared origin and the client's later submodule
          # update (Vercel) can fetch it.
          git update-index --add --cacheinfo 160000,"${NEW_SHA}",spektrum-shared
          git config user.name  "spektrum-sync[bot]"
          git config user.email "spektrum-sync@users.noreply.github.com"
          git commit -m "chore(shared): bump spektrum-shared to ${NEW_SHA:0:12}"
          git push

  notify-home-server:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger backend redeploy (home server)
        env:
          HOOK: ${{ secrets.HOME_DEPLOY_HOOK }}
        run: |
          set -euo pipefail
          if [ -z "${HOOK}" ]; then
            echo "HOME_DEPLOY_HOOK not set; skipping backend notification."
            exit 0
          fi
          curl -fsS -X POST "${HOOK}" \
            -H "Content-Type: application/json" \
            -d "{\"repo\":\"spektrum-shared\",\"sha\":\"${GITHUB_SHA}\"}"
